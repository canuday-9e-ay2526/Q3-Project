<div class="container bg-dark bg-opacity-75 rounded mt-5">
<form>
<div class="row">
  <div class="column"> 
    <div class="container bg-dark bg-opacity-75">
    <img src="RegistrationProf.png" alt="Profile"class="img" width="150px">
      <br>
  <form action="/action_page.php">
  <input type="file" id="myFile" name="filename" class="form-control">
</form>
    </div>
  </div>
  <div class="column">
    <h2 class="mb-4 text-center">Registration</h2>
    <!--First Name -->
    <div class="mb-4">
      <label for="firstName" class="form-label">First Name</label>
      <input type="text" id="firstName" class="form-control" placeholder="First Name" required>
    </div>

    <!-- Last Name -->
    <div class="mb-4">
      <label for="lastName" class="form-label">Last Name</label>
      <input type="text" id="lastName" class="form-control" placeholder="Last Name" required>
    </div>

    <!--Age -->
    <div class="row mb-4">
      <div class="col-md-3">
        <label for="age" class="form-label">Age</label>
        <input type="number" id="age" class="form-control" placeholder="Age" min="0" required>
      </div>

      <!--Contact number -->
      <div class="col-md-3 ms-4">
        <label for="contactNumber" class="form-label">Contact Number</label>
        <input type="text" id="contactNumber" class="form-control" placeholder="Contact Number" required>
      </div>
    </div>

    <!--Email Address -->
    <div class="mb-4">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
    </div>

    <!--Username -->
    <div class="mb-4">
      <label for="username" class="form-label">Enter Your Username</label>
      <input type="text" id="username" class="form-control" placeholder="Username" required>
    </div>

    <!--Password -->
    <div class="mb-4">
      <label for="password" class="form-label">Enter Your Password</label>
      <input type="password" id="password" class="form-control" placeholder="Password" required>
    </div>

    <!-- Confirmation -->
    <div class="form-check mb-4">
      <input type="checkbox" id="confirmInfo" class="form-check-input" required>
      <label for="confirmInfo" class="form-check-label">
        I confirm that the information provided is true and complete
      </label>
    </div>

    <!--Submit Button -->
    <a href="confirmation.html">
        <button type="button" class="btn btn-primary w-100">Submit</button>
    </a>
</form>
</div>
